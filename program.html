<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Программа - Fitness Guide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">Fitness <span>Guide</span></div>
        <nav>
    <ul>
        <li><a href="index.html">Главная</a></li>
        <li><a href="index.html#calculator">Калькулятор</a></li>
        <li><a href="videos.html">Видео</a></li>
        <li><a href="reviews.html">Отзывы</a></li>
        <li><a href="contacts.html">Контакты</a></li>
    </ul>
</nav>
    </div>
</header>

<main>
    <section class="program-page">
        <div class="container">
            
            <a href="index.html" style="font-size: 21px; margin-bottom: 30px;" class="back-btn">← Вернуться к программам</a>
            
            <div id="program-content">
                <!-- Контент будет загружаться через JavaScript -->
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>&copy; 2026 Fitness Guide. Все права защищены.</p>
    </div>
</footer>

<script src="script.js"></script>
<script>
// Данные программ
const programs = {
    cardio: {
        title: "🔥 Кардио для жиросжигания",
        price: "от 1490 ₽",
        description: "Эффективная программа кардио-тренировок для быстрого снижения процента жира и улучшения выносливости.",
        duration: "8 недель",
        level: "Начинающий / Средний",
        frequency: "4–5 тренировок в неделю",
        image: "https://fitness-nonstop.ru/image/catalog/begovaya-dorozhka-2.jpg",
        features: [
            "• Интервальные тренировки HIIT",
            "• Сжигание жира в проблемных зонах",
            "• Улучшение сердечно-сосудистой системы",
            "• Готовые планы на 8 недель",
            "• Видео с правильной техникой"
        ],
        trainers: [
            {name: "Анна Смирнова", exp: "7 лет", spec: "Кардио и жиросжигание"},
            {name: "Дмитрий Ковалёв", exp: "5 лет", spec: "HIIT и функционал"}
        ]
    },
    strength: {
        title: "🏋️ Силовые тренировки на массу",
        price: "от 1990 ₽",
        description: "Классическая силовая программа для гипертрофии мышц. Максимальный рост мышечной массы.",
        duration: "12 недель",
        level: "Средний",
        frequency: "4 тренировки в неделю",
        image: "https://i.pinimg.com/736x/df/94/9d/df949d4c2f43ecc2aaaa364b9c3a1b5f.jpg",
        features: [
            "• Прогрессивная перегрузка",
            "• Работа на основные мышечные группы",
            "• Разделение по группам мышц",
            "• Техника выполнения упражнений",
            "• Рекомендации по питанию"
        ],
        trainers: [
            {name: "Максим Орлов", exp: "9 лет", spec: "Силовой тренинг"},
            {name: "Екатерина Волкова", exp: "6 лет", spec: "Бодибилдинг"}
        ]
    },
    home: {
        title: "🏠 Тренировки дома без зала",
        price: "от 1290 ₽",
        description: "Полноценные тренировки дома с минимальным инвентарём или без него.",
        duration: "10 недель",
        level: "Начинающий",
        frequency: "3–5 тренировок в неделю",
        image: "https://cdn.lifehacker.ru/wp-content/uploads/2020/05/s_1589886018.jpg",
        features: [
            "• Без оборудования / с гантелями",
            "• Круговые и табата тренировки",
            "• Упражнения на все группы мышц",
            "• Адаптация под любой уровень",
            "• Видео-разборы упражнений"
        ],
        trainers: [
            {name: "Ольга Морозова", exp: "8 лет", spec: "Домашний тренинг"}
        ]
    },
    women: {
        title: "🌸 Женская программа «Тонус»",
        price: "от 1790 ₽",
        description: "Специальная программа для девушек: красивые формы, подтянутое тело и женственный силуэт.",
        duration: "10 недель",
        level: "Начинающий / Средний",
        frequency: "4 тренировки в неделю",
        image: "https://medaboutme.ru/upload/medialibrary/ac7/shutterstock_374605270.jpg",
        features: [
            "• Акцент на ягодицы и бёдра",
            "• Работа над осанкой и верхом тела",
            "• Комбинация силовых и кардио",
            "• Упражнения на гибкость",
            "• Рекомендации по питанию для девушек"
        ],
        trainers: [
            {name: "Анастасия Белова", exp: "6 лет", spec: "Женский фитнес"}
        ]
    }
};

function loadProgram() {
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    
    const program = programs[type];
    
    if (!program) {
        document.getElementById('program-content').innerHTML = `<h2>Программа не найдена</h2>`;
        return;
    }

    let trainersHTML = program.trainers.map(t => `
        <div class="trainer-card">
            <h4>${t.name}</h4>
            <p>Опыт: ${t.exp}</p>
            <p>Специализация: ${t.spec}</p>
        </div>
    `).join('');

    document.getElementById('program-content').innerHTML = `
        <div class="program-hero" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('${program.image}')">
            <div class="container">
                <h1>${program.title}</h1>
                <p class="program-price-big">${program.price}</p>
            </div>
        </div>

        <div class="program-info">
            <div class="container">
                <p class="program-description">${program.description}</p>
                
                <div class="program-details">
                    <div class="detail-item">
                        <strong>Длительность:</strong> ${program.duration}
                    </div>
                    <div class="detail-item">
                        <strong>Уровень:</strong> ${program.level}
                    </div>
                    <div class="detail-item">
                        <strong>Частота:</strong> ${program.frequency}
                    </div>
                </div>

                <h2>Что входит в программу:</h2>
                <ul class="features-list">
                    ${program.features.map(f => `<li>${f}</li>`).join('')}
                </ul>

                <h2>Тренеры программы</h2>
                <div class="trainers-grid">
                    ${trainersHTML}
                </div>

                <div class="buy-section">
                    <a href="#" class="btn" style="font-size: 1.3rem; padding: 18px 50px;">Купить программу</a>
                </div>
            </div>
        </div>
    `;
}

window.addEventListener('load', loadProgram);
</script>
</body>
</html>
